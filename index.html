  padding:'10px 16px',fontFamily:FC,fontWeight:600,fontSize:11,letterSpacing:'.08em'};
const btnDanger={background:C.redFt,border:`1px solid ${C.red}`,color:C.red,borderRadius:9,

/* ══ HELPERS ════════════════════════════════════════════════════════════ */
const fB=v=>new Intl.NumberFormat('pt-BR',{style:'currency',currency:'BRL'}).format(v||0);
const fP=(v,d=2)=>v===null||v===undefined?'—':(v>=0?'+':'')+v.toFixed(d)+'%';
const tIdx=d=>d.year*12+d.month;
const MN=['','Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
const parseNum=s=>{
  const v=parseFloat(String(s).trim().replace(/\./g,'').replace(',','.'));
  return isNaN(v)?0:v;
};

const enrich=months=>{
  const s=[...months].sort((a,b)=>tIdx(a)-tIdx(b));
  return s.map((m,i)=>({
    ...m,
    evol:i>0?((m.total-s[i-1].total)/s[i-1].total)*100:null,
    gain:i>0?m.total-s[i-1].total:null,
    gap:i>0?tIdx(m)-tIdx(s[i-1]):0,
    prevLabel:i>0?s[i-1].label:null,
  }));
};

const yearStats=data=>{
  const years=[...new Set(data.map(d=>d.year))].sort();
  return years.map(y=>{
    const yd=data.filter(d=>d.year===y);
    const first=yd[0],last=yd[yd.length-1];
    const prevYear=data.filter(d=>d.year===y-1);
    const prevEnd=prevYear.length?prevYear[prevYear.length-1]:null;
    const growth=prevEnd?((last.total-prevEnd.total)/prevEnd.total)*100:
      ((last.total-first.total)/first.total)*100;
    return{year:y,first,last,growth,months:yd.length,prevEnd};
  });
};

const HistIco=p=><Ico {...p} ch={<><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><circle cx="3" cy="6" r=".6" fill={p.co||'currentColor'} stroke="none"/><circle cx="3" cy="12" r=".6" fill={p.co||'currentColor'} stroke="none"/><circle cx="3" cy="18" r=".6" fill={p.co||'currentColor'} stroke="none"/></>}/>;

const PlusIco=p=><Ico {...p} ch={<><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></>}/>;

const LockIco=p=><Ico {...p} ch={<><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></>}/>;
const UnlockIco=p=><Ico {...p} ch={<><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 019.9-1"/></>}/>;
const LogOutIco=p=><Ico {...p} ch={<><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16,17 21,12 16,7"/><line x1="21" y1="12" x2="9" y2="12"/></>}/>;
const SaveIco=p=><Ico {...p} ch={<><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/><polyline points="17,21 17,13 7,13 7,21"/><polyline points="7,3 7,8 15,8"/></>}/>;
const WalletIco=p=><Ico {...p} ch={<><path d="M21 12V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2h14a2 2 0 002-2v-5"/><path d="M16 12h6v4h-6a2 2 0 010-4z"/></>}/>;
const TargetIco=p=><Ico {...p} ch={<><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="5"/><circle cx="12" cy="12" r="1" fill={p.co||'currentColor'}/></>}/>;

/* ══ ATOMS ══════════════════════════════════════════════════════════════ */
const Pct=({v,sz='md'})=>{

/* ══ CHART ══════════════════════════════════════════════════════════════ */
function HistChart({data,h=180,showYears=true}){
  if(!data||data.length<2)return null;
  const W=360,H=h,PX=14,PY=showYears?24:10;
  const tMin=tIdx(data[0]),tMax=tIdx(data[data.length-1]),tR=tMax-tMin||1;
  const vMax=Math.max(...data.map(d=>d.total))*1.04;
  const xOf=d=>PX+(tIdx(d)-tMin)/tR*(W-2*PX);
  const yOf=d=>H-PY-(d.total/vMax)*(H-PY-8);
  const pts=data.map(d=>[xOf(d),yOf(d)]);

  const segs=[];let seg=[0];
  for(let i=1;i<data.length;i++){
    const g=tIdx(data[i])-tIdx(data[i-1]);
    if(g>2){segs.push(seg);seg=[i];}else seg.push(i);
  }
  segs.push(seg);

  const curvePath=idxs=>idxs.reduce((acc,ii,j)=>{
    const[x,y]=pts[ii];
    if(j===0)return`M${x.toFixed(1)} ${y.toFixed(1)}`;
    const[px,py]=pts[idxs[j-1]];const cx=(px+x)/2;
    return acc+` C${cx.toFixed(1)} ${py.toFixed(1)} ${cx.toFixed(1)} ${y.toFixed(1)} ${x.toFixed(1)} ${y.toFixed(1)}`;
  },'');
  const areaPath=idxs=>{
    const cp=curvePath(idxs);
    const last=pts[idxs[idxs.length-1]],first=pts[idxs[0]];
    return cp+` L${last[0].toFixed(1)} ${H-PY} L${first[0].toFixed(1)} ${H-PY}Z`;
  };

  const years=[...new Set(data.map(d=>d.year))];
  const yearMarks=years.map(y=>{
    const fd=data.find(d=>d.year===y);
    return{y,x:xOf(fd)};
  });
  const grids=[.25,.5,.75].map(f=>H-PY-f*(H-PY-8));

  return(
    <svg viewBox={`0 0 ${W} ${H}`} width="100%" height={h} style={{display:'block',overflow:'visible'}}>
      <defs>
        <linearGradient id="cg" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor="var(--accent)" stopOpacity=".22"/>
          <stop offset="100%" stopColor="var(--accent)" stopOpacity=".01"/>
        </linearGradient>
      </defs>
      {grids.map((gy,i)=>(
        <line key={i} x1={PX} y1={gy} x2={W-PX} y2={gy}
          stroke="var(--border-sub)" strokeWidth=".5" strokeDasharray="3 5"/>
      ))}
      {segs.map((sg,i)=><path key={`a${i}`} d={areaPath(sg)} fill="url(#cg)"/>)}
      {segs.map((sg,i)=><path key={`l${i}`} d={curvePath(sg)} fill="none" stroke={C.gold} strokeWidth="1.5"/>)}
      {pts.map(([x,y],i)=>(
        <g key={i}>
          <circle cx={x} cy={y} r="5" fill="var(--accent-soft)"/>
          <circle cx={x} cy={y} r="2.5" fill={C.gold}/>
        </g>
      ))}
      {showYears&&yearMarks.map(m=>(
        <text key={m.y} x={m.x} y={H-3} textAnchor="middle"
          fill={C.dim} fontSize="8" fontFamily="Cinzel,serif">{m.y}</text>
      ))}
    </svg>
  );
}

/* ══ CATEGORY ALLOCATION ════════════════════════════════════════════════ */
function categoryBreakdown(snapshot, assets, categories){
  if(!snapshot)return[];
  const assetByName={};
  assets.forEach(a=>{assetByName[a.name]=a;});
  const sums={};
  Object.entries(snapshot.assets).forEach(([name,val])=>{
    const a=assetByName[name];
    const cid=a?a.category_id:null;
    sums[cid]=(sums[cid]||0)+val;
  });
  const rows=categories.map(c=>({
    ...c,
    actual: snapshot.total>0?(sums[c.id]||0)/snapshot.total*100:0,
    value: sums[c.id]||0,
  }));
  const uncategorized=sums[null]||sums[undefined]||0;
  if(uncategorized>0.005){
    rows.push({id:null,name:'Sem categoria',color:C.dim,target_percent:0,
      actual:snapshot.total>0?uncategorized/snapshot.total*100:0,value:uncategorized});
  }
  return rows.sort((a,b)=>b.actual-a.actual);
}

function AllocationBars({rows}){
  return(
    <div style={{display:'flex',flexDirection:'column',gap:10}}>
      {rows.map(r=>{
        const diff=r.actual-(r.target_percent||0);
        const overTarget=Math.abs(diff)>3;
        return(
          <div key={r.id??'none'}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'baseline',marginBottom:4}}>
              <span style={{fontFamily:FB,fontSize:13,color:C.txt}}>{r.name}</span>
              <div style={{display:'flex',alignItems:'center',gap:6}}>
                <span style={{fontFamily:FB,fontSize:13,color:C.gold,fontWeight:600}}>
                  {r.actual.toFixed(1)}%
                </span>
                {r.target_percent>0&&(
                  <span style={{fontFamily:FB,fontSize:11,color:overTarget?C.red:C.sub}}>
                    (meta {r.target_percent.toFixed(0)}%)
                  </span>
                )}

/* ══ ANALYSIS ═══════════════════════════════════════════════════════════ */
function Analysis({data,assets,categories}){
  const years=[...new Set(data.map(d=>d.year))].sort();
  const [period,setPeriod]=useState('all');

  const filtered=useMemo(()=>{
    if(period==='all')return data;
    if(period==='12m')return data.slice(-12);
    if(period==='6m')return data.slice(-6);
    return data.filter(d=>d.year===parseInt(period));
  },[data,period]);

  const first=filtered[0],last=filtered[filtered.length-1];
  const totalG=filtered.length>1?((last.total-first.total)/first.total)*100:0;
  const we=filtered.filter(d=>d.evol!==null);
  const avgG=we.length?we.reduce((s,d)=>s+d.evol,0)/we.length:0;
  const totalGain=last.total-first.total;
  const totalContrib=filtered.reduce((s,d)=>s+(d.contribution||0),0);

  const periods=[
    {l:'Tudo',v:'all'},
    {l:'12M',v:'12m'},
    {l:'6M',v:'6m'},
    ...years.map(y=>({l:String(y),v:String(y)})),
  ];

  const assetEvol=first.id!==last.id?
    [...new Set([...Object.keys(first.assets),...Object.keys(last.assets)])]
      .map(k=>({
        name:k,
        start:first.assets[k]||0,
        end:last.assets[k]||0,
        delta:(last.assets[k]||0)-(first.assets[k]||0),
        pct:first.assets[k]?((last.assets[k]||0)-(first.assets[k]||0))/first.assets[k]*100:null,
      }))
      .filter(a=>a.end>0||a.start>0)
      .sort((a,b)=>Math.abs(b.delta)-Math.abs(a.delta))
    :[];

  const allocRows=categoryBreakdown(last,assets,categories);

  return(
    <div style={{padding:'18px 16px 8px'}}>
      <div style={{display:'flex',gap:5,marginBottom:16,flexWrap:'wrap',alignItems:'center'}}>
        <Sec ch="Período" mb={0} extra={{marginRight:4}}/>
        {periods.map(p=>{
          const active=period===p.v;
          return(
            <button key={p.v} onClick={()=>setPeriod(p.v)} style={{
              background:active?C.goldFt:'none',
              border:`0.5px solid ${active?C.goldBd2:C.bd}`,
              color:active?C.goldBr:C.sub,borderRadius:6,padding:'5px 11px',
              fontFamily:FC,fontSize:10,letterSpacing:'.1em'}}>
              {p.l}
            </button>
          );
        })}
      </div>

      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:16}}>
        {[
          {l:'Crescimento Total',v:fP(totalG),co:totalG>=0?C.grn:C.red},
          {l:'Média Mensal',v:fP(avgG),co:avgG>=0?C.grn:C.red},
          {l:'Ganho no Período',v:fB(totalGain),co:totalGain>=0?C.gold:C.red},
          {l:'Aportes no Período',v:fB(totalContrib),co:C.blue},
        ].map(s=>(
          <div key={s.l} style={{background:C.surf,border:`0.5px solid ${C.bd}`,borderRadius:8,padding:'10px 12px'}}>
            <div style={{fontFamily:FC,fontSize:9,letterSpacing:'.1em',color:C.sub,marginBottom:5}}>{s.l}</div>
            <div style={{fontFamily:FC,fontSize:14,fontWeight:600,color:s.co}}>{s.v}</div>
          </div>
        ))}
      </div>

      <Sec ch={`${first.label} → ${last.label}`}/>
      <div style={{marginBottom:16}}>
        <HistChart data={filtered} h={180} showYears={period==='all'||period==='12m'}/>
      </div>

      <Div my={12}/>

      {allocRows.length>0&&(
        <>
          <Sec ch={`Alocação Atual vs. Meta · ${last.label}`}/>
          <div style={{marginBottom:16}}>
            <AllocationBars rows={allocRows}/>
          </div>
          <Div my={12}/>
        </>
      )}

      {assetEvol.length>0&&first.id!==last.id&&(
        <>
          <Sec ch={`Ativos: ${first.label} → ${last.label}`}/>
          <div style={{display:'flex',flexDirection:'column'}}>
            {assetEvol.map(a=>(
              <div key={a.name} style={{padding:'8px 4px',borderBottom:`0.5px solid ${C.bdSub}`}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:3}}>
                  <span style={{fontFamily:FB,fontSize:13,color:C.txt,flex:1,paddingRight:8,
                    overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{a.name}</span>
                  {a.pct!==null?<Pct v={a.pct} sz="sm"/>:
                    <span style={{fontFamily:FB,fontSize:11,color:C.sub}}>novo</span>}
                </div>
                <div style={{display:'flex',justifyContent:'space-between'}}>
                  <span style={{fontFamily:FB,fontSize:11,color:C.dim}}>{fB(a.start)}</span>
                  <span style={{fontFamily:FB,fontSize:12,color:a.delta>=0?C.grn:C.red}}>
                    {a.delta>=0?'+':''}{fB(a.delta)}
                  </span>
                </div>
              </div>
            ))}
          </div>
        </>
      )}
    </div>
  );
}

function NetworkBackground({theme}){

    const resize=()=>{const d=Math.min(window.devicePixelRatio||1,2);canvas.width=innerWidth*d;canvas.height=innerHeight*d;canvas.style.width=innerWidth+'px';canvas.style.height=innerHeight+'px';ctx.setTransform(d,0,0,d,0,0);const count=Math.max(24,Math.min(70,Math.round(innerWidth/22)));pts=Array.from({length:count},()=>({x:Math.random()*innerWidth,y:Math.random()*innerHeight,vx:(Math.random()-.5)*.18,vy:(Math.random()-.5)*.18,r:Math.random()*1.6+.6}));};
    const draw=()=>{ctx.clearRect(0,0,innerWidth,innerHeight);const cs=getComputedStyle(document.documentElement);const color=cs.getPropertyValue('--accent').trim()||'#00bff3';ctx.fillStyle=color;ctx.strokeStyle=color;
      pts.forEach((p,i)=>{if(!reduced){p.x+=p.vx;p.y+=p.vy;if(p.x<0||p.x>innerWidth)p.vx*=-1;if(p.y<0||p.y>innerHeight)p.vy*=-1;}ctx.globalAlpha=.30;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();for(let j=i+1;j<pts.length;j++){const q=pts[j],dx=p.x-q.x,dy=p.y-q.y,dist=Math.hypot(dx,dy);if(dist<145){ctx.globalAlpha=(1-dist/145)*.13;ctx.lineWidth=.7;ctx.beginPath();ctx.moveTo(p.x,p.y);ctx.lineTo(q.x,q.y);ctx.stroke();}}});ctx.globalAlpha=1;if(!reduced)raf=requestAnimationFrame(draw);};
    resize();draw();addEventListener('resize',resize);return()=>{cancelAnimationFrame(raf);removeEventListener('resize',resize)};
  },[theme]);
  return <><canvas ref={ref} aria-hidden="true" style={{position:'fixed',inset:0,zIndex:-3,pointerEvents:'none'}}/><div aria-hidden="true" style={{position:'fixed',inset:'-20%',zIndex:-4,pointerEvents:'none',background:`radial-gradient(circle at 75% 18%,${C.goldFt} 0,transparent 34%),radial-gradient(circle at 10% 80%,${C.goldFt} 0,transparent 31%)`,animation:'ambientMove 18s ease-in-out infinite alternate'}}/><style>{`@keyframes ambientMove{from{transform:translate3d(-2%,-1%,0) scale(1)}to{transform:translate3d(3%,2%,0) scale(1.08)}}`}</style></>;
}

/* ══ ADMIN: ATIVOS ══════════════════════════════════════════════════════ */
function AdminAssets({assets,categories,api,notify}){
  const [newName,setNewName]=useState('');
  const [newCat,setNewCat]=useState(categories[0]?.id??'');
  const [editing,setEditing]=useState(null);

  const add=async()=>{
    if(!newName.trim())return;
    const res=await api.addAsset(newName.trim(),newCat||null);
    if(res.ok){setNewName('');notify('Ativo adicionado.','ok');}
    else notify(res.error,'error');
  };

  const save=async(id,fields)=>{
    const res=await api.updateAsset(id,fields);
    if(res.ok)notify('Ativo atualizado.','ok');
    else notify(res.error,'error');
    setEditing(null);
  };

  const remove=async(asset)=>{
    if(!window.confirm(`Excluir "${asset.name}"? Isso remove TODOS os valores históricos deste ativo. Esta ação não pode ser desfeita.`))return;
    const res=await api.deleteAsset(asset.id);
    if(res.ok)notify('Ativo excluído.','ok');
    else notify(res.error,'error');
  };

  return(
    <div>
      <Sec ch="Adicionar Novo Ativo"/>
      <div style={{display:'flex',flexDirection:'column',gap:8,marginBottom:18}}>
        <input placeholder="Nome do ativo (ex: Itaú, Avenue...)" value={newName}
          onChange={e=>setNewName(e.target.value)} style={inputSt}/>
        <select value={newCat} onChange={e=>setNewCat(e.target.value)} style={inputSt}>
          <option value="">Sem categoria</option>
          {categories.map(c=><option key={c.id} value={c.id}>{c.name}</option>)}
        </select>
        <button onClick={add} style={btnPrimary}>
          <PlusIco sz={12} co={C.goldBr} style={{verticalAlign:'-2px',marginRight:4}}/> ADICIONAR ATIVO
        </button>
      </div>

      <Div my={12}/>

      <Sec ch={`Ativos Cadastrados (${assets.length})`}/>
      <div style={{display:'flex',flexDirection:'column',gap:8}}>
        {assets.map(a=>{
          const isEd=editing===a.id;
          return(
            <div key={a.id} style={{background:C.surf,border:`0.5px solid ${C.bd}`,
              borderRadius:8,padding:'10px 12px'}}>
              {isEd?(
                <div style={{display:'flex',flexDirection:'column',gap:8}}>
                  <input defaultValue={a.name} id={`nm-${a.id}`} style={inputSt}/>
                  <select defaultValue={a.category_id??''} id={`cat-${a.id}`} style={inputSt}>
                    <option value="">Sem categoria</option>
                    {categories.map(c=><option key={c.id} value={c.id}>{c.name}</option>)}
                  </select>
                  <label style={{display:'flex',alignItems:'center',gap:8,fontFamily:FB,fontSize:13,color:C.txt}}>
                    <input type="checkbox" defaultChecked={a.active} id={`act-${a.id}`}
                      style={{width:16,height:16,accentColor:C.gold}}/>
                    Ativo (aparece em novos meses)
                  </label>
                  <div style={{display:'flex',gap:8}}>
                    <button onClick={()=>{
                      const name=document.getElementById(`nm-${a.id}`).value.trim();
                      const cat=document.getElementById(`cat-${a.id}`).value;
                      const act=document.getElementById(`act-${a.id}`).checked;
                      save(a.id,{name,category_id:cat||null,active:act});
                    }} style={{...btnPrimary,flex:1}}>SALVAR</button>
                    <button onClick={()=>setEditing(null)} style={{...btnGhost,flex:1}}>CANCELAR</button>
                  </div>
                </div>
              ):(
                <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',gap:8}}>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontFamily:FB,fontSize:14,color:C.txt,fontWeight:600,
                      overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>
                      {a.name}
                      {!a.active&&<span style={{color:C.dim,fontSize:11,marginLeft:6}}>(inativo)</span>}
                    </div>
                    <div style={{fontFamily:FB,fontSize:11,color:C.sub,marginTop:2}}>
                      {categories.find(c=>c.id===a.category_id)?.name||'Sem categoria'}
                    </div>
                  </div>
                  <div style={{display:'flex',gap:6,flexShrink:0}}>
                    <button onClick={()=>setEditing(a.id)} style={{padding:6,opacity:.7}}>
                      <EditIco sz={15} co={C.gold}/>
                    </button>
                    <button onClick={()=>remove(a)} style={{padding:6,opacity:.7}}>
                      <TrashIco sz={15} co={C.red}/>
                    </button>
                  </div>
                </div>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
}

/* ══ ADMIN: PATRIMÔNIO (lançar valores mensais) ════════════════════════ */
function AdminPatrimonio({data,assets,api,notify}){
  const sorted=[...data].sort((a,b)=>tIdx(b)-tIdx(a));
  const [selId,setSelId]=useState(sorted[0]?.id);
  const [draft,setDraft]=useState({});
  const [mode,setMode]=useState('existing'); // existing | new

  const selected=data.find(d=>d.id===selId);

  useEffect(()=>{
    if(selected){
      const d={};
      assets.filter(a=>a.active||selected.assets[a.name]!==undefined).forEach(a=>{
        d[a.name]=selected.assets[a.name]!==undefined?
          String(selected.assets[a.name]).replace('.',','):'';
      });
      setDraft(d);
    }
  },[selId]);

  const last=sorted[0];
  const nextMonth=last?(last.month===12?1:last.month+1):new Date().getMonth()+1;
  const nextYear=last?(last.month===12?last.year+1:last.year):new Date().getFullYear();
  const nextLabel=`${MN[nextMonth]} ${nextYear}`;

  const startNew=()=>{
    setMode('new');
    const d={};
    assets.filter(a=>a.active).forEach(a=>{
      d[a.name]=last&&last.assets[a.name]!==undefined?
        String(last.assets[a.name]).replace('.',','):'';
    });
    setDraft(d);
  };

  const total=Object.values(draft).reduce((s,v)=>s+parseNum(v),0);

  const save=async()=>{
    const valuesMap={};
    Object.entries(draft).forEach(([name,v])=>{
      const num=parseNum(v);
      if(v!==''&&!isNaN(num))valuesMap[name]=num;
    });

    if(mode==='new'){
      const res=await api.createSnapshot(nextYear,nextMonth,nextLabel,valuesMap);
      if(res.ok){notify(`${nextLabel} salvo com sucesso.`,'ok');setMode('existing');setSelId(res.id);}
      else notify(res.error,'error');
    }else{
      const res=await api.saveSnapshotValues(selected.id,valuesMap);
      if(res.ok)notify(`${selected.label} atualizado.`,'ok');
      else notify(res.error,'error');
    }
  };

  const assetList=mode==='new'
    ?assets.filter(a=>a.active)
    :assets.filter(a=>a.active||selected?.assets[a.name]!==undefined);

  return(
    <div>
      <Sec ch="Selecionar Mês"/>
      <div style={{display:'flex',gap:8,marginBottom:14}}>
        <select value={mode==='new'?'__new__':selId}
          onChange={e=>{
            if(e.target.value==='__new__')startNew();
            else{setMode('existing');setSelId(parseInt(e.target.value));}
          }}
          style={{...inputSt,flex:1}}>
          {sorted.map(m=><option key={m.id} value={m.id}>{m.label} — {fB(m.total)}</option>)}
          <option value="__new__">+ Novo mês ({nextLabel})</option>
        </select>
      </div>

      {mode==='new'&&(
        <div style={{background:C.goldFt,border:`1px solid ${C.goldBd2}`,borderRadius:8,
          padding:'10px 13px',marginBottom:14,fontFamily:FB,fontSize:12,color:C.goldBr}}>
          Criando snapshot de <strong>{nextLabel}</strong>. Os valores foram pré-preenchidos
          com o mês anterior — ajuste cada um.
        </div>
      )}

      <Sec ch="Valores por Ativo"/>
      <div style={{display:'flex',flexDirection:'column',gap:8,marginBottom:14}}>
        {assetList.map(a=>(
          <div key={a.id} style={{display:'flex',alignItems:'center',gap:10}}>
            <span style={{fontFamily:FB,fontSize:13,color:C.txt,flex:1,minWidth:0,
              overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{a.name}</span>
            <div style={{display:'flex',alignItems:'center',gap:4,width:150}}>
              <span style={{fontFamily:FB,fontSize:12,color:C.sub}}>R$</span>
              <input value={draft[a.name]??''}
                onChange={e=>setDraft(d=>({...d,[a.name]:e.target.value}))}
                placeholder="0,00" style={{...inputSt,textAlign:'right'}}/>
            </div>
          </div>
        ))}
      </div>

      <div style={{background:C.surf,border:`0.5px solid ${C.goldBd}`,borderRadius:8,
        padding:'12px 14px',marginBottom:14,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <span style={{fontFamily:FC,fontSize:10,letterSpacing:'.15em',color:C.sub}}>TOTAL CALCULADO</span>
        <span style={{fontFamily:FC,fontSize:18,fontWeight:700,color:C.goldBr}}>{fB(total)}</span>
      </div>

      <button onClick={save} style={{...btnPrimary,width:'100%',display:'flex',
        alignItems:'center',justifyContent:'center',gap:6}}>
        <SaveIco sz={14} co={C.goldBr}/> SALVAR {mode==='new'?nextLabel.toUpperCase():selected?.label.toUpperCase()}
      </button>
    </div>
  );
}

/* ══ ADMIN: APORTES ═════════════════════════════════════════════════════ */
function AdminAportes({data,api,notify}){
  const sorted=[...data].sort((a,b)=>tIdx(b)-tIdx(a));
  const [selId,setSelId]=useState(sorted[0]?.id);
  const selected=data.find(d=>d.id===selId);
  const [amount,setAmount]=useState('');
  const [note,setNote]=useState('');

  useEffect(()=>{
    if(selected){
      setAmount(selected.contribution!=null?String(selected.contribution).replace('.',','):'');
      setNote(selected.contributionNote||'');
    }
  },[selId]);

  const save=async()=>{
    const val=parseNum(amount);
    const res=await api.saveContribution(selected.id,val,note);
    if(res.ok)notify(`Aporte de ${selected.label} salvo.`,'ok');
    else notify(res.error,'error');
  };

  const totalContrib=data.reduce((s,d)=>s+(d.contribution||0),0);

  return(
    <div>
      <Sec ch="Aportes Mensais"/>
      <div style={{background:C.surf,border:`0.5px solid ${C.bd}`,borderRadius:8,
        padding:'10px 13px',marginBottom:16,display:'flex',justifyContent:'space-between'}}>
        <span style={{fontFamily:FB,fontSize:12,color:C.sub}}>Total de aportes registrados</span>
        <span style={{fontFamily:FB,fontSize:14,color:C.blue,fontWeight:600}}>{fB(totalContrib)}</span>
      </div>

      <label style={labelSt}>Mês</label>
      <select value={selId} onChange={e=>setSelId(parseInt(e.target.value))}
        style={{...inputSt,marginBottom:12}}>
        {sorted.map(m=><option key={m.id} value={m.id}>{m.label}</option>)}
      </select>

      <label style={labelSt}>Valor aportado (R$)</label>
      <input value={amount} onChange={e=>setAmount(e.target.value)}
        placeholder="0,00" style={{...inputSt,marginBottom:12}}/>

      <label style={labelSt}>Observação (opcional)</label>
      <input value={note} onChange={e=>setNote(e.target.value)}
        placeholder="ex: aporte extra do 13º salário" style={{...inputSt,marginBottom:16}}/>

      <button onClick={save} style={{...btnPrimary,width:'100%',display:'flex',
        alignItems:'center',justifyContent:'center',gap:6}}>
        <SaveIco sz={14} co={C.goldBr}/> SALVAR APORTE — {selected?.label.toUpperCase()}
      </button>
    </div>
  );
}

/* ══ ADMIN: CATEGORIAS ══════════════════════════════════════════════════ */
function AdminCategorias({categories,api,notify}){
  const [drafts,setDrafts]=useState(()=>{
    const d={};
    categories.forEach(c=>{d[c.id]={target:String(c.target_percent),color:c.color,name:c.name};});
    return d;
  });
  const [newName,setNewName]=useState('');
  const [newTarget,setNewTarget]=useState('');
  const [newColor,setNewColor]=useState('#c9a84c');

  const sumTargets=categories.reduce((s,c)=>s+(parseFloat(drafts[c.id]?.target)||0),0);

  const save=async(c)=>{
    const d=drafts[c.id];
    const res=await api.updateCategory(c.id,{
      name:d.name.trim()||c.name,
      target_percent:parseFloat(d.target)||0,
      color:d.color,
    });
    if(res.ok)notify('Categoria atualizada.','ok');
    else notify(res.error,'error');
  };

  const remove=async(c)=>{
    if(!window.confirm(`Excluir categoria "${c.name}"? Os ativos ficarão sem categoria.`))return;
    const res=await api.deleteCategory(c.id);
    if(res.ok)notify('Categoria excluída.','ok');
    else notify(res.error,'error');
  };

  const add=async()=>{
    if(!newName.trim())return;
    const res=await api.addCategory(newName.trim(),newColor,parseFloat(newTarget)||0);
    if(res.ok){setNewName('');setNewTarget('');notify('Categoria adicionada.','ok');}
    else notify(res.error,'error');
  };

  return(
    <div>
      <Sec ch="Percentuais-Alvo por Categoria"/>
      <div style={{background:sumTargets===100?C.grnFt:C.goldFt,
        border:`1px solid ${sumTargets===100?'rgba(90,171,74,.3)':C.goldBd2}`,
        borderRadius:8,padding:'9px 13px',marginBottom:14,fontFamily:FB,fontSize:12,
        color:sumTargets===100?C.grn:C.goldBr,textAlign:'center'}}>
        Soma das metas: {sumTargets.toFixed(1)}% {sumTargets!==100&&'(ideal: 100%)'}
      </div>

      <div style={{display:'flex',flexDirection:'column',gap:10,marginBottom:18}}>
        {categories.map(c=>(
          <div key={c.id} style={{background:C.surf,border:`0.5px solid ${C.bd}`,
            borderRadius:8,padding:'10px 12px'}}>
            <div style={{display:'flex',gap:8,marginBottom:8}}>
              <input value={drafts[c.id]?.name??c.name}
                onChange={e=>setDrafts(d=>({...d,[c.id]:{...d[c.id],name:e.target.value}}))}
                style={{...inputSt,flex:1}}/>
              <input type="color" value={drafts[c.id]?.color??c.color}
                onChange={e=>setDrafts(d=>({...d,[c.id]:{...d[c.id],color:e.target.value}}))}
                style={{width:40,height:36,padding:2,border:`1px solid ${C.goldBd}`,
                  borderRadius:6,background:C.card2}}/>
            </div>
            <div style={{display:'flex',gap:8,alignItems:'center'}}>
              <span style={{fontFamily:FB,fontSize:12,color:C.sub,flexShrink:0}}>Meta:</span>
              <input value={drafts[c.id]?.target??String(c.target_percent)}
                onChange={e=>setDrafts(d=>({...d,[c.id]:{...d[c.id],target:e.target.value}}))}
                style={{...inputSt,flex:1}}/>
              <span style={{fontFamily:FB,fontSize:12,color:C.sub,flexShrink:0}}>%</span>
              <button onClick={()=>save(c)} style={{...btnGhost,flexShrink:0,padding:'8px 10px'}}>
                <SaveIco sz={13} co={C.gold}/>
              </button>
              <button onClick={()=>remove(c)} style={{...btnGhost,flexShrink:0,padding:'8px 10px'}}>
                <TrashIco sz={13} co={C.red}/>
              </button>
            </div>
          </div>
        ))}
      </div>

      <Div my={12}/>

      <Sec ch="Nova Categoria"/>
      <div style={{display:'flex',flexDirection:'column',gap:8}}>
        <input placeholder="Nome (ex: Previdência)" value={newName}
          onChange={e=>setNewName(e.target.value)} style={inputSt}/>
        <div style={{display:'flex',gap:8}}>
          <input placeholder="Meta % (ex: 10)" value={newTarget}
            onChange={e=>setNewTarget(e.target.value)} style={{...inputSt,flex:1}}/>
          <input type="color" value={newColor} onChange={e=>setNewColor(e.target.value)}
            style={{width:44,height:36,padding:2,border:`1px solid ${C.goldBd}`,
              borderRadius:6,background:C.card2}}/>
        </div>
        <button onClick={add} style={btnPrimary}>
          <PlusIco sz={12} co={C.goldBr} style={{verticalAlign:'-2px',marginRight:4}}/> ADICIONAR CATEGORIA
        </button>
      </div>
    </div>
  );
}

            </button>
          );

      </div>

      {tab==='patrimonio'&&<AdminPatrimonio data={data} assets={assets} api={api} notify={notify}/>}
      {tab==='aportes'&&<AdminAportes data={data} api={api} notify={notify}/>}
      {tab==='ativos'&&<AdminAssets assets={assets} categories={categories} api={api} notify={notify}/>}
      {tab==='categorias'&&<AdminCategorias categories={categories} api={api} notify={notify}/>}
    </div>
  );
}

/* ══ DATA LAYER ═════════════════════════════════════════════════════════ */
function buildMonths(snapshots,assets,values,contributions){
  const assetById={};
  assets.forEach(a=>{assetById[a.id]=a;});
  return snapshots.map(sn=>{
    const vals=values.filter(v=>v.snapshot_id===sn.id);
    const assetsObj={};
    vals.forEach(v=>{
      const a=assetById[v.asset_id];
      if(a)assetsObj[a.name]=Number(v.value);
    });
    const total=Object.values(assetsObj).reduce((a,b)=>a+b,0);
    const contrib=contributions.find(c=>c.snapshot_id===sn.id);
    return{
      id:sn.id,label:sn.label,year:sn.year,month:sn.month,
      assets:assetsObj,total,
      contribution:contrib?Number(contrib.amount):null,
      contributionNote:contrib?.note||'',
    };
  });
}

/* ══ APP ROOT ═══════════════════════════════════════════════════════════ */
function App(){
  const [theme,setTheme]=useState(()=>localStorage.getItem('patrimonio-theme')||'dark');
  useEffect(()=>{document.documentElement.dataset.theme=theme;localStorage.setItem('patrimonio-theme',theme);},[theme]);

  // ── Auth state ──────────────────────────────────────────────────────
  // authChecked: false = ainda não sabemos se há sessão (aguardando Supabase)
  // session: null = não autenticado; objeto = autenticado
  const [authChecked,setAuthChecked]=useState(false);
  const [session,setSession]=useState(null);
  const [authBusy,setAuthBusy]=useState(false);
  const [authError,setAuthError]=useState('');

  // ── Data state (só populado após autenticação) ───────────────────────
  const [loading,setLoading]=useState(false);
  const [loadError,setLoadError]=useState('');
  const [rawSnapshots,setRawSnapshots]=useState([]);
  const [assets,setAssets]=useState([]);
  const [categories,setCategories]=useState([]);
  const [snapshotValues,setSnapshotValues]=useState([]);
  const [contributions,setContributions]=useState([]);
  const [view,setView]=useState('dash');
  const [toast,setToast]=useState(null);

  const notify=useCallback((msg,type='info')=>{
    setToast({msg,type});
    setTimeout(()=>setToast(null),3000);
  },[]);

  // fetchAll só é chamado quando há sessão ativa
  const fetchAll=useCallback(async()=>{
    if(!sb||!session)return;
    setLoading(true);
    try{
      const [c,a,s,v,ct]=await Promise.all([
        sb.from('categories').select('*').order('sort_order',{ascending:true}),
        sb.from('assets').select('*').order('sort_order',{ascending:true}),
        sb.from('snapshots').select('*').order('year',{ascending:true}).order('month',{ascending:true}),
        sb.from('snapshot_values').select('*'),
        sb.from('contributions').select('*'),
      ]);
      const err=c.error||a.error||s.error||v.error||ct.error;
      if(err)throw err;
      setCategories(c.data||[]);
      setAssets(a.data||[]);
      setRawSnapshots(s.data||[]);
      setSnapshotValues(v.data||[]);
      setContributions(ct.data||[]);
      setLoadError('');
    }catch(err){
      setLoadError(err.message||'Erro ao carregar dados do Supabase.');
    }finally{
      setLoading(false);
    }
  },[session]);

  // Verifica a sessão sem permitir que a tela fique presa no loading.
  // Mesmo que a rede, o CDN ou o Supabase demorem, o app libera a tela de login.
  useEffect(()=>{
    let alive=true;
    let subscription=null;
    const safetyTimer=setTimeout(()=>{
      if(alive)setAuthChecked(true);
    },5000);

    const clearFinancialState=()=>{
      setRawSnapshots([]);setAssets([]);setCategories([]);
      setSnapshotValues([]);setContributions([]);
      setLoadError('');setView('dash');
    };

    const initAuth=async()=>{
      if(!sb){
        if(alive)setAuthChecked(true);
        return;
      }
      try{
        const {data,error}=await sb.auth.getSession();
        if(error)throw error;
        if(alive)setSession(data?.session||null);
      }catch(err){
        console.error('Falha ao verificar sessão:',err);
        if(alive){
          setSession(null);
          setAuthError('Não foi possível verificar a sessão. Confira a conexão e tente entrar novamente.');
        }
      }finally{
        if(alive)setAuthChecked(true);
      }

      try{
        const {data}=sb.auth.onAuthStateChange((_event,nextSession)=>{
          if(!alive)return;
          setSession(nextSession||null);
          setAuthChecked(true);
          if(!nextSession)clearFinancialState();
        });
        subscription=data?.subscription||null;
      }catch(err){
        console.error('Falha ao registrar observador de autenticação:',err);
      }
    };

    initAuth();
    return ()=>{
      alive=false;
      clearTimeout(safetyTimer);
      if(subscription)subscription.unsubscribe();
    };
  },[]);

  // Busca dados somente quando sessão se torna disponível
  useEffect(()=>{
    if(session)fetchAll();
  },[session]);

  // Realtime — só ativo com sessão
  useEffect(()=>{
    if(!sb||!session)return;
    let to;
    const deb=()=>{clearTimeout(to);to=setTimeout(fetchAll,400);};
    const ch=sb.channel('db-changes')
      .on('postgres_changes',{event:'*',schema:'public',table:'snapshot_values'},deb)
      .on('postgres_changes',{event:'*',schema:'public',table:'snapshots'},deb)
      .on('postgres_changes',{event:'*',schema:'public',table:'assets'},deb)
      .on('postgres_changes',{event:'*',schema:'public',table:'categories'},deb)
      .on('postgres_changes',{event:'*',schema:'public',table:'contributions'},deb)
      .subscribe();
    return ()=>{clearTimeout(to);sb.removeChannel(ch);};
  },[session,fetchAll]);

  const handleLogin=async(email,pw)=>{
    if(!sb){
      setAuthError('Supabase indisponível. Verifique o config.js e o carregamento da biblioteca.');
      return;
    }
    setAuthBusy(true);setAuthError('');
    try{
      const {data,error}=await sb.auth.signInWithPassword({email,password:pw});
      if(error)throw error;
      if(data?.session){
        setSession(data.session);
        setAuthChecked(true);
      }
    }catch(err){
      console.error('Falha no login:',err);
      setAuthError('E-mail ou senha inválidos, ou não foi possível acessar o Supabase.');
    }finally{
      setAuthBusy(false);
    }
  };
  const handleLogout=async()=>{
    await sb.auth.signOut();
    // onAuthStateChange cuida de limpar os dados e a sessão
  };

  /* ── API: todas as operações de escrita ── */
  const api=useMemo(()=>({
    addAsset: async(name,category_id)=>{
      try{
        const sort_order=assets.length;
        const {error}=await sb.from('assets').insert({name,category_id,active:true,sort_order});
        if(error)throw error;
        return{ok:true};
      }catch(err){return{ok:false,error:err.message};}
    },
    updateAsset: async(id,fields)=>{
      try{
        const{error}=await sb.from('assets').update(fields).eq('id',id);
        if(error)throw error;
        return{ok:true};
      }catch(err){return{ok:false,error:err.message};}
    },
    deleteAsset: async(id)=>{
      try{
        const{error}=await sb.from('assets').delete().eq('id',id);
        if(error)throw error;
        return{ok:true};
      }catch(err){return{ok:false,error:err.message};}
    },
    createSnapshot: async(year,month,label,valuesMap)=>{
      try{
        const{data:snap,error:e1}=await sb.from('snapshots')
          .insert({year,month,label,snapshot_date:new Date().toISOString().slice(0,10)})
          .select().single();
        if(e1)throw e1;
        const rows=Object.entries(valuesMap).map(([name,value])=>{
          const asset=assets.find(a=>a.name===name);
          return asset?{snapshot_id:snap.id,asset_id:asset.id,value}:null;
        }).filter(Boolean);
        if(rows.length){
          const{error:e2}=await sb.from('snapshot_values')
            .upsert(rows,{onConflict:'snapshot_id,asset_id'});
          if(e2)throw e2;
        }
        return{ok:true,id:snap.id};
      }catch(err){return{ok:false,error:err.message};}
    },
    saveSnapshotValues: async(snapshotId,valuesMap)=>{
      try{
        const rows=Object.entries(valuesMap).map(([name,value])=>{
          const asset=assets.find(a=>a.name===name);
          return asset?{snapshot_id:snapshotId,asset_id:asset.id,value}:null;
        }).filter(Boolean);
        if(rows.length){
          const{error}=await sb.from('snapshot_values')
            .upsert(rows,{onConflict:'snapshot_id,asset_id'});
          if(error)throw error;
        }
        return{ok:true};
      }catch(err){return{ok:false,error:err.message};}
    },
    saveContribution: async(snapshotId,amount,note)=>{
      try{
        const{error}=await sb.from('contributions')
          .upsert({snapshot_id:snapshotId,amount,note},{onConflict:'snapshot_id'});
        if(error)throw error;
        return{ok:true};
      }catch(err){return{ok:false,error:err.message};}
    },
    updateCategory: async(id,fields)=>{
      try{
        const{error}=await sb.from('categories').update(fields).eq('id',id);
        if(error)throw error;
        return{ok:true};
      }catch(err){return{ok:false,error:err.message};}
    },
    addCategory: async(name,color,target_percent)=>{
      try{
        const sort_order=categories.length;
        const{error}=await sb.from('categories').insert({name,color,target_percent,sort_order});
        if(error)throw error;
        return{ok:true};
      }catch(err){return{ok:false,error:err.message};}
    },
    deleteCategory: async(id)=>{
      try{
        const{error}=await sb.from('categories').delete().eq('id',id);
        if(error)throw error;
        return{ok:true};
      }catch(err){return{ok:false,error:err.message};}
    },
  }),[assets,categories]);

  const months=useMemo(()=>buildMonths(rawSnapshots,assets,snapshotValues,contributions),
    [rawSnapshots,assets,snapshotValues,contributions]);
  const data=useMemo(()=>enrich(months),[months]);

  // Remove o loading inicial do HTML após verificar sessão
  useEffect(()=>{
    if(!authChecked)return;
    const el=document.getElementById('loading');
    if(el){el.style.opacity='0';setTimeout(()=>el.remove(),400);}
  },[authChecked]);

  // ── Guards ──────────────────────────────────────────────────────────
  if(!CONFIGURED)return <SetupScreen/>;
  if(!SUPABASE_AVAILABLE)return(
    <CenterScreen title="BIBLIOTECA DO SUPABASE INDISPONÍVEL" Ico={WarnIco}>
      O navegador não conseguiu carregar a biblioteca do Supabase. Verifique a conexão,
      desative temporariamente bloqueadores de scripts e recarregue a página.
    </CenterScreen>
  );

  // Aguardando Supabase confirmar sessão → loading spinner (nada renderizado)
  if(!authChecked)return null;

  // Sessão inválida ou inexistente → tela de login, NENHUM dado financeiro
  if(!session){
    return(
      <div className="app-shell" style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',padding:'max(16px,var(--sat)) 16px max(16px,var(--sab))'}}>
        <NetworkBackground theme={theme}/>
        <div className="glass" style={{width:'100%',maxWidth:440,background:C.surf,border:`1px solid ${C.goldBd}`,borderRadius:22,boxShadow:C.shadow,overflow:'hidden'}}>
          <LoginForm onLogin={handleLogin} busy={authBusy} error={authError} theme={theme} setTheme={setTheme}/>
        </div>
      </div>
    );
  }

  // ── Usuário autenticado → app completo ──────────────────────────────
  if(loadError)return <ErrorScreen msg={loadError} onRetry={fetchAll}/>;

  if(loading)return(
    <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',
      background:C.appBg}}>
      <div style={{textAlign:'center'}}>
        <div style={{fontFamily:FC,fontSize:9,letterSpacing:'.25em',color:C.sub,marginBottom:8}}>
          CARREGANDO DADOS
        </div>
        <div style={{fontFamily:FB,fontSize:12,color:C.dim}}>Aguarde...</div>
      </div>
    </div>
  );

  if(data.length===0&&view!=='admin')return(
    <div style={{background:C.appBg,minHeight:'100vh'}}>
      <EmptyScreen/>
      <BottomNav view={view} setView={setView} session={session}/>
    </div>
  );

  return(
    <div className="app-shell desktop-frame" style={{minHeight:'100vh',color:C.txt,fontFamily:FB,display:'flex',flexDirection:'column',margin:'0 auto'}}>
      <NetworkBackground theme={theme}/>
      <div className="glass" style={{position:'sticky',top:0,zIndex:50,background:C.headerBg,borderBottom:`1px solid ${C.goldBd}`,paddingTop:'calc(var(--sat,0px) + 8px)',paddingBottom:8,paddingLeft:14,paddingRight:14,display:'flex',alignItems:'center',justifyContent:'space-between',gap:12}}>
        <Brand/>
        <ThemeSwitcher theme={theme} setTheme={setTheme} compact={true}/>
      </div>

      <div style={{flex:1,overflowY:'auto',paddingBottom:'calc(var(--sab,20px) + 64px)'}}>
        {view==='dash'&&<Dashboard data={data} assets={assets} categories={categories}/>}
        {view==='hist'&&<Timeline data={data}/>}
        {view==='anal'&&<Analysis data={data} assets={assets} categories={categories}/>}
        {view==='admin'&&(
          <Admin session={session} onLogout={handleLogout}
            data={data} assets={assets} categories={categories} api={api} notify={notify}/>
        )}
      </div>

      <BottomNav view={view} setView={setView} session={session}/>
      <Toast msg={toast?.msg} type={toast?.type}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
<script>
// Fallback externo: impede loading infinito caso algum script de terceiros falhe.
window.setTimeout(function(){
  var el=document.getElementById('loading');
  if(el && el.parentNode){
    el.style.opacity='0';
    window.setTimeout(function(){if(el && el.parentNode)el.parentNode.removeChild(el);},400);
  }
},7000);

if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('./sw.js').catch(()=>{});
  });
}
</script>
